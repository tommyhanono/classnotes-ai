<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F1729" />
    <meta name="description" content="Toma apuntes de clase con IA en tiempo real" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📒</text></svg>" />
    <title>ClassNotes AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0F1729;
        color: #E8EDF5;
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      @keyframes pulse-ring {
        0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.5); }
        70% { box-shadow: 0 0 0 18px rgba(22, 163, 74, 0); }
        100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
      }
      .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .spin { animation: spin 0.8s linear infinite; display: inline-block; }
      * { scrollbar-width: thin; scrollbar-color: #2D3F5C #0F1729; }
      *::-webkit-scrollbar { width: 6px; }
      *::-webkit-scrollbar-track { background: #0F1729; }
      *::-webkit-scrollbar-thumb { background: #2D3F5C; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
